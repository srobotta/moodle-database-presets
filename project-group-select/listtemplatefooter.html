</table>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const getChoices = (cell) => {
     if (!cell) {
        cell = document.querySelector('table.plain-results td');
     }
     const [p1, p2, p3] = cell.innerHTML.split('||')
       .map(e => parseInt(e))
       .map(e => {
         return isNaN(e) ? -1 : e
       });
     return [p1, p2, p3];
  };

  // First check, if we see a single group name, then assume we are a student
  // and see if we already got any results. In case of yes, hide the "Add entry" button.
  let addButtonHidden = false;
  const g = document.querySelector('div.groupselector').innerHTML;
  const group = g.substring(g.indexOf(':') + 1).trim();
  document.querySelectorAll('td.groupname').forEach(td => {
    if (td.innerHTML.trim() === group) {
      const stickyFooter = document.querySelector('.stickyfooter');
      if (stickyFooter) stickyFooter.style.visibility = 'hidden';
      const navitem = document.querySelector('.navitem a.btn-primary');
      if (navitem) navitem.style.display = 'none';
      addButtonHidden = true;
    }
  });
  // Set the h4 content from the strings for the choices.
  document.querySelector('.choice-by-group > h4').innerHTML = STR.h_choices;
  // Do not process results any further when Add Entry button was hidden.
  if (addButtonHidden) {
    const choicesSelected = getChoices();
    document.getElementsByClassName('choice-by-group')[0].innerHTML+= `
    <div>${STR.selected_by_group}</div>
    <div>1. ${getChoiceName(choicesSelected[0])}</div>
    <div>2. ${getChoiceName(choicesSelected[1])}</div>
    <div>3. ${getChoiceName(choicesSelected[2])}</div>
    `;
    document.getElementsByClassName('choice-results')[0].remove();
    return;
  }
  // Set the h4 content from the strings for the ranking.
  document.querySelector('.choice-results > h4').innerHTML = STR.h_ranking;
  const projects = []; // Collect here all projects with 2nd and 3rd vote from each group.
  for (const c of choices) {
    // Create an array of two elements (second, third choice) and hold group names
    // there as an array in their order of the choices.
    projects.push([ [], [] ]);
  }
  // Store here groups that are finally assigned to a project, e.g. their accepted choice.
  const selectedProjects = {};
  const selectedGroups = [];
  // Store processed group names and their selections,
  // that also avoids counting more than one vote for a group.
  const groupsdone = {};
  const rows = document.querySelectorAll('table.plain-results tr');
  for (let i = 0; i < rows.length; i++) {
    const g = rows[i].querySelector('td.groupname').innerHTML.trim();
    if (groupsdone.hasOwnProperty(g)) {
      console.log(`Group ${g} has been counted already, no double votes.`);
      continue; 
    }
    // Remember that we found the group in the list of results.
    // When the project has not been choosen, take the prefered choice for the group.
    const priority = getChoices(rows[i].querySelector('td'));
    groupsdone[g] = priority;
    if (typeof(selectedProjects[priority[0]]) === 'undefined') {
      selectedProjects[priority[0]] = [g, STR.reason_1];
      selectedGroups.push(g);
      continue;
    }
    // Push the group name to each project at the correct valued position.
    projects[priority[1]][0].push(g);
    projects[priority[2]][1].push(g);
  }
  // Run over all second and third choices and assign these to the group, if possible.
  // Do this several times, until all groups are assigned or no projects are left over.
  [0, 1].forEach(c => {
    for (let i = 0; i < choices.length; i++) {
      // Current project has not yet been choosen by a group.
      if (typeof(selectedProjects[i]) === 'undefined') {
        while (projects[i][c].length > 0) {      
          const g = projects[i][c].shift();
          // If group is already in the selection, they had their higher prioritized choice selected.
          if (selectedGroups.includes(g)) continue;
          // Pick the second or third choice of that group.
          selectedProjects[i] = [g, (c === 0) ? STR.reason_2 : STR.reason_3 ];
          selectedGroups.push(g);
          break;
        }
      }
    }
  });
  // We still might have groups that have no assigned project yet, assign any project
  // that is still available but was not choosen by the group.
  for (const g in groupsdone) {
    if (!selectedGroups.includes(g)) {
      for (let i = 0; i < choices.length; i++) {
        if (typeof(selectedProjects[i]) === 'undefined') {
          selectedProjects[i] = [g, STR.reason_random];
          selectedGroups.push(g);
          break;
        }
      }
    }
  }
  let html = `<table>
    <tr>
      <th>${STR.th_project}</th>
      <th>${STR.th_group}</th>
      <th>${STR.th_reason}</th>
     </tr>`;
  for (let i = 0; i < choices.length; i++) {
    html += `<tr><td>${choices[i]}</td>`;
    if (typeof(selectedProjects[i]) !== 'undefined') {
      html += `<td>${selectedProjects[i][0]}</td><td>${selectedProjects[i][1]}</td>`;
    } else {
      html += '<td></td><td></td>';
    }
    html += '</tr>';
  }
  html += '</table>';
  document.getElementsByClassName('choice-results')[0].innerHTML+= html;
  
  html = `<table>
    <tr>
      <th>${STR.th_group}</th>
      <th>${STR.reason_1}</th>
      <th>${STR.reason_2}</th>
      <th>${STR.reason_3}</th>
    </tr>`;
  for (const g in groupsdone) {
    html += `<tr><td>${g}</td>`;
    for (let i = 0; i < 3; i++) {
      let cell = '<td>__</td>';
      if (g === selectedProjects[groupsdone[g][i]][0]) {
        cell = cell.replace('__', '<strong>__</strong>');
      }
      html += cell.replace('__', getChoiceName(groupsdone[g][i]));
    }
    html += '</tr>';
  }
  html += '</table>';
  document.getElementsByClassName('choice-by-group')[0].innerHTML+= html;
});
</script>
